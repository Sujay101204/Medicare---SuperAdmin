<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCare – List Doctors</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --teal:       #0a7b6e;
      --teal-light: #12a898;
      --teal-pale:  #e6f5f3;
      --cream:      #f8f6f1;
      --text:       #1a2630;
      --muted:      #5e7180;
      --border:     #cfe4e1;
      --white:      #ffffff;
      --error:      #e84b4b;
      --warn:       #c9973b;
      --success:    #2ecc71;
      --nav-h:      72px;
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
 
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .32;
      pointer-events: none;
      z-index: 0;
    }
 
    /* ══ NAV ══ */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(248,246,241,.93);
      backdrop-filter: blur(14px);
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center;
      padding: 0 28px; gap: 0;
      box-shadow: 0 2px 24px rgba(10,123,110,.07);
    }
    .brand { display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;margin-right:20px; }
    .brand-logo {
      width:44px;height:44px;border-radius:50%;
      background:linear-gradient(135deg,var(--teal),var(--teal-light));
      display:flex;align-items:center;justify-content:center;
      font-size:22px;box-shadow:0 4px 14px rgba(10,123,110,.3);flex-shrink:0;
    }
    .brand-name { font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--teal);letter-spacing:-.3px; }
    .brand-sub  { font-size:10px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase; }
 
    .nav-links { display:flex;align-items:center;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none; }
    .nav-links::-webkit-scrollbar { display:none; }
 
    .nav-item {
      display:flex;flex-direction:column;align-items:center;gap:4px;
      padding:8px 13px;border-radius:10px;cursor:pointer;
      border:none;background:transparent;color:var(--muted);
      font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
      letter-spacing:.2px;transition:all .22s;white-space:nowrap;position:relative;
    }
    .nav-item svg { width:17px;height:17px;stroke-width:1.8;transition:all .22s;stroke:currentColor;fill:none; }
    .nav-item:hover { background:var(--teal-pale);color:var(--teal); }
    .nav-item:hover svg { transform:translateY(-1px); }
    .nav-item.active { background:var(--teal-pale);color:var(--teal);font-weight:600; }
    .nav-item.active::after {
      content:'';position:absolute;bottom:4px;
      width:16px;height:2px;border-radius:2px;background:var(--teal);
    }
 
    .nav-right { display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:14px; }
    .nav-schema {
      padding:9px 18px;border-radius:10px;
      border:1.8px solid var(--border);background:var(--white);
      color:var(--text);font-family:'DM Sans',sans-serif;
      font-size:12px;font-weight:600;cursor:pointer;transition:all .22s;
      display:flex;align-items:center;gap:7px;
    }
    .nav-schema:hover { border-color:var(--teal);color:var(--teal); }
    .nav-schema svg { width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8; }
    .nav-signout {
      padding:9px 20px;border-radius:10px;
      border:1.8px solid var(--teal);background:transparent;color:var(--teal);
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .22s;
    }
    .nav-signout:hover { background:var(--teal);color:var(--white);box-shadow:0 4px 14px rgba(10,123,110,.3); }
 
    /* ══ MAIN ══ */
    main { position:relative;z-index:1;padding:40px 40px 80px;max-width:1100px;margin:auto; }
 
    @keyframes fadeUp {
      from { opacity:0;transform:translateY(16px); }
      to   { opacity:1;transform:translateY(0); }
    }
    @keyframes popIn {
      from { opacity:0;transform:scale(.9); }
      to   { opacity:1;transform:scale(1); }
    }
 
    /* ══ TOP BAR ══ */
    .topbar {
      display:flex;align-items:center;justify-content:space-between;
      gap:16px;flex-wrap:wrap;margin-bottom:20px;
      animation: fadeUp .45s .1s both;
    }
 
    .topbar-left { display:flex;align-items:center;gap:14px; }
    .topbar-icon {
      width:46px;height:46px;border-radius:50%;
      background:linear-gradient(135deg,var(--teal),var(--teal-light));
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
      box-shadow:0 4px 16px rgba(10,123,110,.22);
    }
    .topbar-title { font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--text); }
    .topbar-sub   { font-size:12.5px;color:var(--muted);margin-top:1px; }
 
    .search-wrap {
      display:flex;align-items:center;gap:10px;flex:1;max-width:480px;
    }
    .search-box {
      flex:1;position:relative;
    }
    .search-box svg {
      position:absolute;left:13px;top:50%;transform:translateY(-50%);
      width:16px;height:16px;stroke:var(--muted);stroke-width:1.8;fill:none;pointer-events:none;
    }
    .search-box input {
      width:100%;padding:10px 14px 10px 38px;
      border-radius:10px;border:1.5px solid var(--border);
      background:var(--white);font-family:'DM Sans',sans-serif;
      font-size:13.5px;color:var(--text);outline:none;transition:all .22s;
    }
    .search-box input:focus {
      border-color:var(--teal-light);box-shadow:0 0 0 3px rgba(18,168,152,.12);
    }
    .clear-btn {
      padding:10px 18px;border-radius:10px;
      border:1.5px solid var(--border);background:var(--white);
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
      color:var(--muted);cursor:pointer;transition:all .22s;white-space:nowrap;
    }
    .clear-btn:hover { border-color:var(--teal);color:var(--teal); }
 
    /* ══ FILTERS ══ */
    .filters {
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:24px;
      animation: fadeUp .45s .18s both;
    }
    .filter-label { font-size:12px;color:var(--muted);font-weight:500;margin-right:4px; }
 
    .filter-chip {
      padding:7px 16px;border-radius:20px;
      border:1.5px solid var(--border);background:var(--white);
      font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;
      color:var(--muted);cursor:pointer;transition:all .22s;
    }
    .filter-chip:hover { border-color:var(--teal-light);color:var(--teal); }
    .filter-chip.active {
      background:var(--teal);border-color:var(--teal);color:var(--white);font-weight:600;
    }
 
    .sort-select {
      margin-left:auto;padding:7px 14px;border-radius:10px;
      border:1.5px solid var(--border);background:var(--white);
      font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--muted);
      outline:none;cursor:pointer;transition:all .22s;
    }
    .sort-select:focus { border-color:var(--teal-light); }
 
    /* ══ RESULTS INFO ══ */
    .results-info {
      font-size:13px;color:var(--muted);margin-bottom:16px;
      animation: fadeUp .45s .24s both;
    }
    .results-info strong { color:var(--teal); }
 
    /* ══ DOCTOR ROWS ══ */
    .doctors-list { display:flex;flex-direction:column;gap:12px; }
 
    .doctor-row {
      background:var(--white);
      border:1.5px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      transition:all .25s cubic-bezier(.22,.68,0,1.2);
      animation: fadeUp .4s both;
    }
    .doctor-row:hover { box-shadow:0 8px 32px rgba(10,123,110,.1);border-color:var(--teal-light); }
 
    /* collapsed row */
    .row-main {
      display:flex;align-items:center;gap:16px;
      padding:16px 20px;cursor:pointer;
    }
 
    .doc-avatar {
      width:58px;height:58px;border-radius:12px;
      background:linear-gradient(135deg,var(--teal-pale),var(--teal-light));
      display:flex;align-items:center;justify-content:center;
      font-size:26px;flex-shrink:0;overflow:hidden;
      border:2px solid var(--border);
    }
    .doc-avatar img { width:100%;height:100%;object-fit:cover; }
 
    .doc-core { flex:1;min-width:0; }
    .doc-name-row {
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      margin-bottom:4px;
    }
    .doc-name {
      font-family:'Playfair Display',serif;
      font-size:16px;font-weight:700;color:var(--text);
    }
    .avail-dot {
      display:inline-flex;align-items:center;gap:5px;
      font-size:12px;font-weight:600;
    }
    .avail-dot::before {
      content:'';width:7px;height:7px;border-radius:50%;
      background:currentColor;display:inline-block;
    }
    .avail-dot.available  { color:var(--success); }
    .avail-dot.busy       { color:var(--error); }
    .avail-dot.on-leave   { color:var(--warn); }
 
    .doc-meta {
      font-size:13px;color:var(--muted);
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    }
    .doc-meta span { display:flex;align-items:center;gap:4px; }
 
    /* right side of row */
    .doc-right {
      display:flex;align-items:center;gap:16px;flex-shrink:0;
    }
    .doc-rating {
      display:flex;align-items:center;gap:5px;
      font-size:14px;font-weight:600;color:var(--text);
    }
    .doc-rating svg { width:15px;height:15px;fill:var(--warn);stroke:var(--warn);stroke-width:1; }
    .doc-fee {
      display:flex;align-items:center;gap:5px;
      font-size:13.5px;font-weight:600;color:var(--teal);
      background:var(--teal-pale);padding:5px 12px;border-radius:20px;
      border:1px solid var(--border);
    }
 
    .expand-btn {
      width:32px;height:32px;border-radius:50%;
      border:1.5px solid var(--border);background:var(--cream);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .25s;flex-shrink:0;
    }
    .expand-btn svg { width:14px;height:14px;stroke:var(--muted);stroke-width:2.2;fill:none;transition:transform .3s; }
    .expand-btn:hover { border-color:var(--teal);background:var(--teal-pale); }
    .expand-btn:hover svg { stroke:var(--teal); }
    .doctor-row.expanded .expand-btn svg { transform:rotate(180deg); }
    .doctor-row.expanded .expand-btn { border-color:var(--teal);background:var(--teal-pale); }
    .doctor-row.expanded .expand-btn svg { stroke:var(--teal); }
 
    /* quick actions inline */
    .doc-actions-inline {
      display:flex;align-items:center;gap:8px;
    }
    .action-del {
      display:flex;align-items:center;gap:5px;
      padding:5px 12px;border-radius:8px;
      border:1.5px solid var(--error);color:var(--error);
      background:transparent;font-family:'DM Sans',sans-serif;
      font-size:11.5px;font-weight:600;cursor:pointer;transition:all .2s;
    }
    .action-del:hover { background:var(--error);color:var(--white); }
    .action-del svg { width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2; }
 
    .doc-patients {
      display:flex;align-items:center;gap:5px;
      font-size:12.5px;color:var(--muted);font-weight:500;
    }
    .doc-patients svg { width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.8; }
 
    /* ── expanded detail panel ── */
    .row-detail {
      max-height:0;overflow:hidden;
      transition:max-height .4s cubic-bezier(.22,.68,0,1.1);
      border-top:0px solid var(--border);
    }
    .doctor-row.expanded .row-detail {
      max-height:500px;
      border-top:1.5px solid var(--border);
    }
 
    .detail-inner {
      padding:22px 24px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:20px;
    }
 
    .detail-block { }
    .detail-block-title {
      font-size:11px;font-weight:700;color:var(--teal);
      letter-spacing:.7px;text-transform:uppercase;margin-bottom:8px;
    }
    .detail-block-val { font-size:13.5px;color:var(--text);line-height:1.6; }
    .detail-block-val.muted { color:var(--muted); }
 
    .slots-wrap { display:flex;flex-wrap:wrap;gap:6px;margin-top:2px; }
    .slot-pill {
      padding:4px 12px;border-radius:20px;
      background:var(--teal-pale);border:1px solid var(--border);
      font-size:11.5px;color:var(--teal);font-weight:500;
    }
 
    .detail-stats {
      display:flex;gap:14px;flex-wrap:wrap;
    }
    .d-stat {
      text-align:center;padding:10px 16px;
      background:var(--cream);border-radius:10px;border:1px solid var(--border);
      min-width:70px;
    }
    .d-stat-val { font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--teal); }
    .d-stat-lbl { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px; }
 
    /* ══ EMPTY ══ */
    .empty-state {
      text-align:center;padding:72px 24px;
      border:1.5px dashed var(--border);border-radius:18px;
      background:var(--white);
    }
    .empty-icon { font-size:56px;margin-bottom:14px;opacity:.35; }
    .empty-title { font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px; }
    .empty-sub   { font-size:14px;color:var(--muted); }
 
    /* ══ CONFIRM MODAL ══ */
    .modal-overlay {
      position:fixed;inset:0;z-index:200;
      background:rgba(10,38,48,.45);backdrop-filter:blur(4px);
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .modal-overlay.show { opacity:1;pointer-events:all; }
    .modal {
      background:var(--white);border-radius:20px;
      padding:36px 32px;max-width:380px;width:90%;
      box-shadow:0 24px 64px rgba(10,38,48,.2);
      transform:scale(.92) translateY(20px);transition:all .28s cubic-bezier(.22,.68,0,1.2);
    }
    .modal-overlay.show .modal { transform:scale(1) translateY(0); }
    .modal-icon { font-size:40px;margin-bottom:14px;text-align:center; }
    .modal-title { font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--text);text-align:center;margin-bottom:8px; }
    .modal-sub   { font-size:14px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:26px; }
    .modal-btns  { display:flex;gap:10px; }
    .modal-cancel {
      flex:1;padding:12px;border-radius:10px;
      border:1.5px solid var(--border);background:transparent;
      font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
      color:var(--muted);cursor:pointer;transition:all .2s;
    }
    .modal-cancel:hover { border-color:var(--muted);color:var(--text); }
    .modal-confirm {
      flex:1;padding:12px;border-radius:10px;
      border:none;background:var(--error);
      font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
      color:var(--white);cursor:pointer;transition:all .2s;
    }
    .modal-confirm:hover { background:#c93a3a;box-shadow:0 4px 14px rgba(232,75,75,.3); }
 
    /* ══ TOAST ══ */
    .toast {
      position:fixed;bottom:28px;right:28px;z-index:999;
      padding:13px 22px;border-radius:12px;
      font-size:13.5px;font-weight:500;
      box-shadow:0 8px 28px rgba(0,0,0,.15);
      transform:translateY(80px);opacity:0;
      transition:all .35s cubic-bezier(.22,.68,0,1.2);
      pointer-events:none;color:var(--white);
    }
    .toast.show { transform:translateY(0);opacity:1; }
    .toast.success { background:var(--teal); }
    .toast.error   { background:var(--error); }
    .toast.warn    { background:var(--warn); }
 
    @media(max-width:800px){
      .detail-inner { grid-template-columns:1fr 1fr; }
      .topbar { flex-direction:column;align-items:flex-start; }
      .search-wrap { max-width:100%;width:100%; }
    }
    @media(max-width:560px){
      main { padding:20px 14px 60px; }
      .detail-inner { grid-template-columns:1fr; }
      .doc-right { flex-wrap:wrap;gap:8px; }
      .nav-item { padding:6px 9px;font-size:10px; }
    }
  </style>
</head>
<body>
 
<!-- ══ NAV ══ -->
<nav>
  <a class="brand" href="#">
    <div class="brand-logo">🏥</div>
    <div>
      <div class="brand-name">MediCare</div>
      <div class="brand-sub">Healthcare Solutions</div>
    </div>
  </a>
  <div class="nav-links" id="navLinks"></div>
  <div class="nav-right">
    <button class="nav-schema">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
      Add Schema
    </button>
    <button class="nav-signout" onclick="showToast('Signing out…','success')">Sign Out</button>
  </div>
</nav>
 
<!-- ══ MAIN ══ -->
<main>
 
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">👨‍⚕️</div>
      <div>
        <div class="topbar-title">Find a Doctor</div>
        <div class="topbar-sub">Search by name or specialization</div>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search doctors, specialization…" oninput="applyFilters()"/>
      </div>
      <button class="clear-btn" onclick="clearSearch()">Clear</button>
    </div>
  </div>
 
  <!-- Filters -->
  <div class="filters" id="filtersBar">
    <span class="filter-label">Filter:</span>
    <button class="filter-chip active" data-filter="all"       onclick="setFilter(this,'all')">All</button>
    <button class="filter-chip"        data-filter="available" onclick="setFilter(this,'available')">🟢 Available</button>
    <button class="filter-chip"        data-filter="busy"      onclick="setFilter(this,'busy')">🔴 Busy</button>
    <button class="filter-chip"        data-filter="on-leave"  onclick="setFilter(this,'on-leave')">🟡 On Leave</button>
    <select class="sort-select" id="sortSelect" onchange="applyFilters()">
      <option value="default">Sort: Default</option>
      <option value="name">Name A–Z</option>
      <option value="rating">Highest Rating</option>
      <option value="fee-asc">Fee: Low to High</option>
      <option value="fee-desc">Fee: High to Low</option>
      <option value="exp">Most Experienced</option>
    </select>
  </div>
 
  <!-- Results info -->
  <div class="results-info" id="resultsInfo"></div>
 
  <!-- Doctors -->
  <div class="doctors-list" id="doctorsList"></div>
 
</main>
 
<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">Remove Doctor?</div>
    <div class="modal-sub" id="modalSub">This action cannot be undone.</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmDelete()">Yes, Remove</button>
    </div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
/* ── NAV ── */
const navItems = [
  { label:'Dashboard',            active:false, icon:`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>` },
  { label:'Add Doctor',           active:false, icon:`<svg viewBox="0 0 24 24"><circle cx="10" cy="7" r="4"/><path d="M2 21v-2a8 8 0 0 1 12.95-6.3"/><line x1="19" y1="13" x2="19" y2="19"/><line x1="16" y1="16" x2="22" y2="16"/></svg>` },
  { label:'List Doctors',         active:true,  icon:`<svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a8 8 0 0 1 16 0v2"/></svg>` },
  { label:'Appointments',         active:false, icon:`<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>` },
  { label:'Service Dashboard',    active:false, icon:`<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>` },

/* ── FILTER / SORT / SEARCH ── */
function setFilter(el, val) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = val;
  applyFilters();
}
 
function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSelect').value;
 
  let list = doctors.filter(d => {
    const matchFilter = activeFilter === 'all' || d.avail === activeFilter;
    const matchSearch = !q || d.name.toLowerCase().includes(q) || d.spec.toLowerCase().includes(q) || d.loc.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
 
  if (sort === 'name')     list.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'rating')   list.sort((a,b) => b.rating - a.rating);
  if (sort === 'fee-asc')  list.sort((a,b) => a.fee - b.fee);
  if (sort === 'fee-desc') list.sort((a,b) => b.fee - a.fee);
  if (sort === 'exp')      list.sort((a,b) => b.exp - a.exp);
 
  document.getElementById('resultsInfo').innerHTML =
    `Showing <strong>${list.length}</strong> of <strong>${doctors.length}</strong> doctor${doctors.length!==1?'s':''}${q ? ` for "<strong>${q}</strong>"` : ''}`;
 
  renderDoctors(list);
}
 
function clearSearch() {
  document.getElementById('searchInput').value = '';
  applyFilters();
}
 
/* ── RENDER ── */
function renderDoctors(list) {
  const el = document.getElementById('doctorsList');
  el.innerHTML = '';
 
  if (!list.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No doctors found</div>
        <div class="empty-sub">Try adjusting your search or filter.</div>
      </div>`;
    return;
  }
 
  list.forEach((d, i) => {
    const availClass = d.avail.replace(' ','-');
    const availLabel = d.avail.charAt(0).toUpperCase() + d.avail.slice(1).replace('-',' ');
    const stars = '★'.repeat(Math.round(d.rating)) + '☆'.repeat(5 - Math.round(d.rating));
 
    const row = document.createElement('div');
    row.className = 'doctor-row';
    row.dataset.id = d.id;
    row.style.animationDelay = `${i * .055}s`;
 
    row.innerHTML = `
      <div class="row-main" onclick="toggleExpand(${d.id})">

          ${d.avatar ? `<img src="${d.avatar}" alt="${d.name}"/>` : '👨‍⚕️'}

        <div class="doc-core">

          </div>
          <div class="doc-meta">
            <span>🩺 ${d.spec}</span>
            <span style="color:var(--border)">•</span>
            <span>⏱ ${d.exp} years</span>
            <span style="color:var(--border)">•</span>
            <span>📍 ${d.loc}</span>
          </div>
        </div>
        <div class="doc-right">
          <div class="doc-patients">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ${d.patients}
          </div>
          <button class="action-del" onclick="event.stopPropagation();openModal(${d.id})">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Delete
          </button>
          <div class="doc-rating">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            ${d.rating}
          </div>
          <div class="doc-fee">₹ ${d.fee}</div>
          <button class="expand-btn" onclick="event.stopPropagation();toggleExpand(${d.id})" title="View details">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
      </div>
      <div class="row-detail" id="detail-${d.id}">
        <div class="detail-inner">
          <div class="detail-block">
            <div class="detail-block-title">About</div>
            <div class="detail-block-val muted">${d.about}</div>
          </div>
          <div class="detail-block">
            <div class="detail-block-title">Qualifications</div>
            <div class="detail-block-val">${d.qual}</div>
            <div style="margin-top:16px;">

                <div class="d-stat">
                  <div class="d-stat-val">${d.rating}</div>
                  <div class="d-stat-lbl">Rating</div>
                </div>
                <div class="d-stat">
                  <div class="d-stat-val">${d.success}%</div>
                  <div class="d-stat-lbl">Success</div>
                </div>

                </div>
              </div>

          </div>

              ? `<div class="slots-wrap">${d.slots.map(s=>`<span class="slot-pill">📅 ${s}</span>`).join('')}</div>`
              : `<div class="detail-block-val muted">No slots scheduled yet.</div>`
            }
          </div>
        </div>
      </div>`;
    el.appendChild(row);
  });
}
 
/* ── EXPAND ── */
const expandedSet = new Set();
function toggleExpand(id) {
  const row = document.querySelector(`.doctor-row[data-id="${id}"]`);
  if (!row) return;
  if (expandedSet.has(id)) {
    expandedSet.delete(id);
    row.classList.remove('expanded');
  } else {
    expandedSet.add(id);
    row.classList.add('expanded');
  }
}
 
/* ── DELETE MODAL ── */
function openModal(id) {
  deleteTargetId = id;
  const d = doctors.find(x => x.id === id);
  document.getElementById('modalSub').textContent =
    `Remove Dr. ${d?.name} from the team? This cannot be undone.`;
  document.getElementById('confirmModal').classList.add('show');
}
function closeModal() {
  document.getElementById('confirmModal').classList.remove('show');
  deleteTargetId = null;
}
function confirmDelete() {
  if (!deleteTargetId) return;
  const d = doctors.find(x => x.id === deleteTargetId);
  doctors = doctors.filter(x => x.id !== deleteTargetId);
  closeModal();
  applyFilters();
  showToast(`Dr. ${d?.name} has been removed.`, 'error');
}
document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
 
/* ── TOAST ── */
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
 
/* ── INIT ── */
applyFilters();
