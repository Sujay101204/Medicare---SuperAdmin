<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCare – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --teal:       #0a7b6e;
      --teal-light: #12a898;
      --teal-pale:  #e6f5f3;
      --cream:      #f8f6f1;
      --text:       #1a2630;
      --muted:      #5e7180;
      --border:     #cfe4e1;
      --white:      #ffffff;
      --red:        #e84b4b;
      --red-pale:   #fdeaea;
      --green:      #1a9e6e;
      --green-pale: #e6f7f1;
      --gold:       #c9973b;
      --gold-pale:  #fdf3e3;
      --nav-h:      72px;
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
 
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .28;
      pointer-events: none;
      z-index: 0;
    }
 
    /* ══════════ NAV ══════════ */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(248,246,241,.94);
      backdrop-filter: blur(14px);
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center;
      padding: 0 28px; gap: 0;
      box-shadow: 0 2px 24px rgba(10,123,110,.07);
    }
 
    .brand {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; flex-shrink: 0; margin-right: 20px;
    }
    .brand-logo {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--teal-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 4px 14px rgba(10,123,110,.3);
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700; color: var(--teal); letter-spacing: -.3px;
    }
    .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; }
 
    .nav-links {
      display: flex; align-items: center; gap: 2px;
      flex: 1; overflow-x: auto; scrollbar-width: none;
    }
    .nav-links::-webkit-scrollbar { display: none; }
 
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 13px; border-radius: 10px; cursor: pointer;
      border: none; background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
      letter-spacing: .2px; transition: all .22s; white-space: nowrap; position: relative;
    }
    .nav-item svg { width: 18px; height: 18px; stroke-width: 1.8; transition: all .22s; }
    .nav-item:hover { background: var(--teal-pale); color: var(--teal); }
    .nav-item:hover svg { stroke: var(--teal); transform: translateY(-1px); }
    .nav-item.active { background: var(--teal-pale); color: var(--teal); font-weight: 600; }
    .nav-item.active svg { stroke: var(--teal); }
    .nav-item.active::after {
      content: ''; position: absolute; bottom: 4px;
      width: 18px; height: 2px; border-radius: 2px; background: var(--teal);
    }
 
    .nav-signout {
      flex-shrink: 0; margin-left: 14px;
      padding: 9px 20px; border-radius: 10px;
      border: 1.8px solid var(--teal); background: transparent;
      color: var(--teal); font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .22s;
    }
    .nav-signout:hover { background: var(--teal); color: var(--white); box-shadow: 0 4px 14px rgba(10,123,110,.3); }
 
    /* ══════════ PAGE ══════════ */
    .page { position: relative; z-index: 1; padding: 40px 44px 80px; max-width: 1300px; margin: auto; }
 
    .page-header { margin-bottom: 32px; animation: fadeUp .5s .1s both; }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 36px; font-weight: 900; color: var(--text);
      letter-spacing: -.8px; line-height: 1;
    }
    .page-sub { font-size: 14px; color: var(--muted); margin-top: 5px; }
 
    /* ══════════ STAT CARDS ══════════ */
    .stats-grid {
      display: flex; flex-wrap: wrap; gap: 14px;
      margin-bottom: 36px;
      animation: fadeUp .5s .2s both;
    }
 
    .stat-card {
      flex: 1 1 180px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 50px;          /* pill shape */
      padding: 18px 22px;
      display: flex; align-items: center; gap: 14px;
      transition: all .25s cubic-bezier(.22,.68,0,1.2);
      cursor: default; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, var(--teal-pale) 0%, transparent 60%);
      opacity: 0; transition: opacity .25s;
    }
    .stat-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 28px rgba(10,123,110,.10); border-color: var(--teal-light); }
    .stat-card:hover::before { opacity: 1; }
 
    .stat-icon {
      width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
      background: var(--teal-pale);
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }
    .stat-icon svg { width: 22px; height: 22px; stroke: var(--teal); stroke-width: 1.8; }
 
    .stat-icon.gold { background: var(--gold-pale); }
    .stat-icon.gold svg { stroke: var(--gold); }
    .stat-icon.green { background: var(--green-pale); }
    .stat-icon.green svg { stroke: var(--green); }
    .stat-icon.red { background: var(--red-pale); }
    .stat-icon.red svg { stroke: var(--red); }
 
    .stat-info { position: relative; z-index: 1; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: .2px; margin-bottom: 3px; }
    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 900; color: var(--text); line-height: 1;
    }
    .stat-value.loading {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
 
    /* spinner */
    .spin {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2.5px solid var(--border);
      border-top-color: var(--teal);
      animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
 
    /* ══════════ SEARCH ══════════ */
    .search-section {
      margin-bottom: 28px;
      animation: fadeUp .5s .35s both;
    }
    .search-label {
      font-size: 15px; font-weight: 600; color: var(--text);
      margin-bottom: 10px; display: block;
    }
    .search-row { display: flex; gap: 10px; align-items: center; }
 
    .search-wrap {
      position: relative; flex: 1; max-width: 400px;
    }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; stroke: var(--muted); stroke-width: 2; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 11px 16px 11px 40px;
      border: 1.5px solid var(--border); border-radius: 50px;
      background: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--teal-light); box-shadow: 0 0 0 3px rgba(18,168,152,.12); }
 
    .btn-clear {
      padding: 10px 22px; border-radius: 50px;
      border: 1.5px solid var(--border); background: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .btn-clear:hover { border-color: var(--red); color: var(--red); background: var(--red-pale); }
 
    /* ══════════ TABLE CARD ══════════ */
    .table-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(10,123,110,.07);
      animation: fadeUp .5s .45s both;
    }
 
    .table-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1.5px solid var(--border);
    }
    .table-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700; color: var(--text);
    }
    .table-status {
      font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 7px;
    }
 
    table {
      width: 100%; border-collapse: collapse;
    }
    thead tr { background: var(--cream); }
    thead th {
      text-align: left; padding: 13px 20px;
      font-size: 11px; font-weight: 600; color: var(--muted);
      letter-spacing: .8px; text-transform: uppercase;
      border-bottom: 1.5px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .18s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--teal-pale); }
    tbody td {
      padding: 14px 20px; font-size: 14px; color: var(--text);
      vertical-align: middle;
    }
 
    /* doctor cell */
    .doc-cell { display: flex; align-items: center; gap: 11px; }
    .doc-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      color: var(--white);
    }
    .doc-name { font-weight: 600; font-size: 14px; }
    .doc-email { font-size: 12px; color: var(--muted); }
 
    .badge {
      display: inline-block; padding: 3px 11px; border-radius: 20px;
      font-size: 11.5px; font-weight: 600; letter-spacing: .2px;
    }
    .badge-teal { background: var(--teal-pale); color: var(--teal); }
    .badge-gold { background: var(--gold-pale); color: var(--gold); }
 
    /* skeleton rows */
    .skel-row td { padding: 16px 20px; }
    .skel {
      border-radius: 8px; background: linear-gradient(90deg, #e8ede9 25%, #f5f8f5 50%, #e8ede9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-circle { width: 36px; height: 36px; border-radius: 50%; }
    .skel-line { height: 13px; }
    .skel-sm { width: 60%; }
    .skel-xs { width: 40%; margin-top: 5px; height: 10px; }
 
    /* empty state */
    .empty-state {
      text-align: center; padding: 52px 20px;
      color: var(--muted); font-size: 14px;
    }
    .empty-state svg { width: 48px; height: 48px; stroke: var(--border); stroke-width: 1.2; margin-bottom: 14px; }
 
    /* pagination */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; border-top: 1.5px solid var(--border);
      font-size: 13px; color: var(--muted);
    }
    .pag-btns { display: flex; gap: 6px; }
    .pag-btn {
      padding: 6px 14px; border-radius: 8px;
      border: 1.5px solid var(--border); background: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--muted); cursor: pointer; transition: all .18s;
    }
    .pag-btn:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); background: var(--teal-pale); }
    .pag-btn:disabled { opacity: .4; cursor: not-allowed; }
    .pag-btn.active { background: var(--teal); border-color: var(--teal); color: var(--white); }
 
    /* toast */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      background: var(--teal); color: var(--white);
      padding: 13px 22px; border-radius: 12px;
      font-size: 13.5px; font-weight: 500;
      box-shadow: 0 8px 28px rgba(10,123,110,.35);
      transform: translateY(80px); opacity: 0;
      transition: all .35s cubic-bezier(.22,.68,0,1.2);
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
 
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }
 
    @media (max-width: 900px) {
      .page { padding: 24px 16px 60px; }
      .stats-grid { gap: 10px; }
      .stat-card { flex: 1 1 140px; padding: 14px 16px; border-radius: 40px; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
 
<!-- ══ NAV ══ -->
<nav>
  <a class="brand" href="#">
    <div class="brand-logo">🏥</div>
    <div>
      <div class="brand-name">MediCare</div>
      <div class="brand-sub">Healthcare Solutions</div>
    </div>
  </a>
  <div class="nav-links" id="navLinks"></div>
  <button class="nav-signout" onclick="showToast('Signing out… See you soon!')">Sign Out</button>
</nav>
 
<!-- ══ PAGE ══ -->
<div class="page">
 
  <div class="page-header">
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Overview of doctors &amp; appointments</div>
  </div>
 
  <!-- stat cards -->
  <div class="stats-grid" id="statsGrid"></div>
 
  <!-- search -->
  <div class="search-section">
    <span class="search-label">Search doctors</span>
    <div class="search-row">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search name / specialization / fee" oninput="filterDoctors()" />
      </div>
      <button class="btn-clear" onclick="clearSearch()">Clear</button>
    </div>
  </div>
 
  <!-- doctors table -->
  <div class="table-card">
    <div class="table-head">
      <div class="table-title">Doctors</div>
      <div class="table-status" id="tableStatus"><div class="spin"></div> Loading data…</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Doctor</th>
          <th>Specialization</th>
          <th>Fee</th>
          <th>Appointments</th>
          <th>Completed</th>
          <th>Canceled</th>
          <th>Total Earnings</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pagination" id="pagination" style="display:none">
      <span id="pagInfo"></span>
      <div class="pag-btns" id="pagBtns"></div>
    </div>
  </div>
 
</div>
 
<div class="toast" id="toast"></div>
 
<script>
/* ── NAV ── */
const navItems = [
  { label:'Dashboard',           active:true,  icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>` },
  { label:'Add Doctor',          active:false, icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="10" cy="7" r="4"/><path d="M2 21v-2a8 8 0 0 1 12.95-6.3"/><line x1="19" y1="13" x2="19" y2="19"/><line x1="16" y1="16" x2="22" y2="16"/></svg>` },
  { label:'List Doctors',        active:false, icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a8 8 0 0 1 16 0v2"/></svg>` },
  { label:'Appointments',        active:false, icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>` },
  { label:'Service Dashboard',   active:false, icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>` },
  { label:'Add Service',         active:false, icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>` },
  { label:'List Services',       active:false, icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>` },
  { label:'Service Appointments',active:false, icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>` },
  { label:'Add Schema',          active:false, icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>` },
];
const navEl = document.getElementById('navLinks');
navItems.forEach(item => {
  const b = document.createElement('button');
  b.className = 'nav-item' + (item.active ? ' active' : '');
  b.innerHTML = item.icon + `<span>${item.label}</span>`;
  b.onclick = () => {
    navEl.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    showToast(`Navigating to ${item.label}`);
  };
  navEl.appendChild(b);
});
 
/* ── MOCK DATA ── */
const COLORS = ['#0a7b6e','#12a898','#c9973b','#e84b4b','#1a9e6e','#6c5ce7','#0984e3','#d63031'];
const SPECS = ['Cardiologist','Neurologist','Dermatologist','Orthopedic','Pediatrician','Oncologist','Gynecologist','General Physician'];
const NAMES = [
  ['Dr. Arjun Mehta','arjun@medicare.in'],
  ['Dr. Priya Sharma','priya@medicare.in'],
  ['Dr. Rohan Das','rohan@medicare.in'],
  ['Dr. Sneha Patel','sneha@medicare.in'],
  ['Dr. Vikram Roy','vikram@medicare.in'],
  ['Dr. Ananya Sen','ananya@medicare.in'],
  ['Dr. Karan Bose','karan@medicare.in'],
  ['Dr. Meera Nair','meera@medicare.in'],
  ['Dr. Suresh Iyer','suresh@medicare.in'],
  ['Dr. Divya Kapoor','divya@medicare.in'],
  ['Dr. Ravi Gupta','ravi@medicare.in'],
  ['Dr. Pooja Joshi','pooja@medicare.in'],
];
 
const allDoctors = NAMES.map(([name, email], i) => {
  const appt = Math.floor(Math.random()*120)+10;
  const completed = Math.floor(appt * (.6 + Math.random()*.3));
  const canceled  = Math.floor((appt - completed) * Math.random());
  const fee = (Math.floor(Math.random()*8)+3) * 100;
  return {
    name, email, spec: SPECS[i % SPECS.length],
    fee, appt, completed, canceled,
    earnings: completed * fee,
    color: COLORS[i % COLORS.length],
    initials: name.split(' ').slice(1).map(w=>w[0]).join('').toUpperCase().slice(0,2)
  };
});
 
/* ── STATS CONFIG ── */
const statsConfig = [
  { label:'Total Doctors',          key:'doctors',     icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="10" cy="7" r="4"/><path d="M2 21v-2a8 8 0 0 1 16 0v2"/></svg>`,                                   cls:'',      prefix:'',  loading:false },
  { label:'Total Registered Users', key:'users',       icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`, cls:'',      prefix:'',  loading:true  },
  { label:'Total Appointments',     key:'appt',        icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,        cls:'',      prefix:'',  loading:false },
  { label:'Total Earnings',         key:'earnings',    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,  cls:'gold',  prefix:'₹', loading:false },
  { label:'Completed',              key:'completed',   icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,                cls:'green', prefix:'',  loading:false },
  { label:'Canceled',               key:'canceled',    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,    cls:'red',   prefix:'',  loading:false },
];
 
function computeStats() {
  return {
    doctors:   allDoctors.length,
    users:     null, // loading
    appt:      allDoctors.reduce((s,d)=>s+d.appt,0),
    earnings:  allDoctors.reduce((s,d)=>s+d.earnings,0).toLocaleString('en-IN'),
    completed: allDoctors.reduce((s,d)=>s+d.completed,0),
    canceled:  allDoctors.reduce((s,d)=>s+d.canceled,0),
  };
}
 
function renderStats(vals) {
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  statsConfig.forEach(cfg => {
    const val = vals[cfg.key];
    const card = document.createElement('div');
    card.className = 'stat-card';
    const valueHTML = (cfg.loading || val === null)
      ? `<div class="stat-value loading"><div class="spin"></div> Loading…</div>`
      : `<div class="stat-value">${cfg.prefix}${val}</div>`;
    card.innerHTML = `
      <div class="stat-icon ${cfg.cls}">${cfg.icon}</div>
      <div class="stat-info">
        <div class="stat-label">${cfg.label}</div>
        ${valueHTML}
      </div>`;
    grid.appendChild(card);
  });
}
 
/* ── TABLE ── */
const PER_PAGE = 6;
let filtered = [...allDoctors];
let currentPage = 1;
 
function renderSkeletons() {
  const tb = document.getElementById('tableBody');
  tb.innerHTML = Array(PER_PAGE).fill(0).map(()=>`
    <tr class="skel-row">
      <td><div style="display:flex;align-items:center;gap:11px">
        <div class="skel skel-circle"></div>
        <div><div class="skel skel-line skel-sm"></div><div class="skel skel-line skel-xs"></div></div>
      </div></td>
      ${Array(6).fill('<td><div class="skel skel-line" style="width:70%"></div></td>').join('')}
    </tr>`).join('');
}
 
function renderTable() {
  const tb = document.getElementById('tableBody');
  const start = (currentPage-1)*PER_PAGE;
  const slice = filtered.slice(start, start+PER_PAGE);
 
  if (!slice.length) {
    tb.innerHTML = `<tr><td colspan="7">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <div>No doctors found matching your search.</div>
      </div>
    </td></tr>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }
 
  tb.innerHTML = slice.map(d => `
    <tr>
      <td><div class="doc-cell">
        <div class="doc-avatar" style="background:${d.color}">${d.initials}</div>
        <div><div class="doc-name">${d.name}</div><div class="doc-email">${d.email}</div></div>
      </div></td>
      <td><span class="badge badge-teal">${d.spec}</span></td>
      <td>₹${d.fee.toLocaleString('en-IN')}</td>
      <td>${d.appt}</td>
      <td><span class="badge badge-gold">${d.completed}</span></td>
      <td style="color:var(--red);font-weight:600">${d.canceled}</td>
      <td style="color:var(--teal);font-weight:700">₹${d.earnings.toLocaleString('en-IN')}</td>
    </tr>`).join('');
 
  renderPagination();
}
 
function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pag = document.getElementById('pagination');
  const info = document.getElementById('pagInfo');
  const btns = document.getElementById('pagBtns');
 
  if (total <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';
  info.textContent = `Showing ${(currentPage-1)*PER_PAGE+1}–${Math.min(currentPage*PER_PAGE, filtered.length)} of ${filtered.length}`;
 
  btns.innerHTML = '';
  const prev = document.createElement('button');
  prev.className = 'pag-btn'; prev.textContent = '← Prev';
  prev.disabled = currentPage === 1;
  prev.onclick = () => { currentPage--; renderTable(); };
  btns.appendChild(prev);
 
  for (let p = 1; p <= total; p++) {
    const b = document.createElement('button');
    b.className = 'pag-btn' + (p===currentPage?' active':'');
    b.textContent = p;
    b.onclick = () => { currentPage = p; renderTable(); };
    btns.appendChild(b);
  }
 
  const next = document.createElement('button');
  next.className = 'pag-btn'; next.textContent = 'Next →';
  next.disabled = currentPage === total;
  next.onclick = () => { currentPage++; renderTable(); };
  btns.appendChild(next);
}
 
function filterDoctors() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filtered = allDoctors.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.spec.toLowerCase().includes(q) ||
    String(d.fee).includes(q)
  );
  currentPage = 1;
  renderTable();
}
 
function clearSearch() {
  document.getElementById('searchInput').value = '';
  filtered = [...allDoctors];
  currentPage = 1;
  renderTable();
}
 
/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
 
/* ── INIT ── */
(function init() {
  renderStats(computeStats());
  renderSkeletons();
 
  // simulate load delay
  setTimeout(() => {
    document.getElementById('tableStatus').innerHTML = `${allDoctors.length} doctors loaded`;
    renderTable();
 
    // simulate users loaded
    setTimeout(() => {
      const vals = computeStats();
      vals.users = 3842;
      statsConfig[1].loading = false;
      renderStats(vals);
    }, 800);
  }, 1200);
})();
</script>

<script>
  document.addEventListener('DOMContentLoaded', function() {

      { selector: '.stat-card:nth-child(1), .stat-pill:nth-child(1)', url: 'list-Doctors.html' },
      { selector: '.stat-card:nth-child(2), .stat-pill:nth-child(2)', url: 'appointments.html' },
      { selector: '.stat-card:nth-child(3), .stat-pill:nth-child(3)', url: 'Service-Dashboard.html' },
      { selector: '.stat-card:nth-child(4), .stat-pill:nth-child(4)', url: 'list-Services.html' },
    ];
    statLinks.forEach(function(sl) {
      try {
        document.querySelectorAll(sl.selector).forEach(function(el) {
          el.style.cursor = 'pointer';
          el.addEventListener('click', function() { window.location.href = sl.url; });
        });
      } catch(e) {}
    });
    // Quick action buttons
    var qaMap = {
      'Add New Doctor':   'Add-Doctor.html',
      'Book Appointment': 'appointments.html',
      'Add Service':      'Add-Service.html',
      'View Reports':     'Service-Dashboard.html',
      'Add Doctor':       'Add-Doctor.html',
      'List Doctors':     'list-Doctors.html',
      'Appointments':     'appointments.html',
      'Services':         'list-Services.html'
    };
    document.querySelectorAll('.action-btn, .quick-action, .quick-btn').forEach(function(btn) {
      var txt = btn.textContent.trim();
      for (var key in qaMap) {
        if (txt.indexOf(key) !== -1) {
          btn.onclick = function(url) { return function() { window.location.href = url; }; }(qaMap[key]);
          break;
        }
      }
    });
  });
</script>
